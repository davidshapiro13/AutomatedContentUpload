name: Reels Publisher

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

concurrency:
  group: reels-publisher
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  post-due:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run publisher
        env:
          ZERNIO_API_KEY: ${{ secrets.ZERNIO_API_KEY }}
          ZERNIO_PROFILE_ID: ${{ secrets.ZERNIO_PROFILE_ID }}
          ZERNIO_TIKTOK_ACCOUNT_ID: ${{ secrets.ZERNIO_TIKTOK_ACCOUNT_ID }}
          ZERNIO_INSTAGRAM_ACCOUNT_ID: ${{ secrets.ZERNIO_INSTAGRAM_ACCOUNT_ID }}
          ZERNIO_YOUTUBE_ACCOUNT_ID: ${{ secrets.ZERNIO_YOUTUBE_ACCOUNT_ID }}
          FACEBOOK_PAGE_ID: ${{ secrets.FACEBOOK_PAGE_ID }}
          FACEBOOK_PAGE_ACCESS_TOKEN: ${{ secrets.FACEBOOK_PAGE_ACCESS_TOKEN }}
          FACEBOOK_GRAPH_API_VERSION: ${{ secrets.FACEBOOK_GRAPH_API_VERSION }}
          YOUTUBE_ACCESS_TOKEN: ${{ secrets.YOUTUBE_ACCESS_TOKEN }}
          YOUTUBE_AUTO_REFRESH: ${{ secrets.YOUTUBE_AUTO_REFRESH }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_CATEGORY_ID: ${{ secrets.YOUTUBE_CATEGORY_ID }}
          MEDIA_S3_BUCKET: ${{ secrets.MEDIA_S3_BUCKET }}
          MEDIA_S3_REGION: ${{ secrets.MEDIA_S3_REGION }}
          MEDIA_S3_ENDPOINT_URL: ${{ secrets.MEDIA_S3_ENDPOINT_URL }}
          MEDIA_S3_PUBLIC_BASE_URL: ${{ secrets.MEDIA_S3_PUBLIC_BASE_URL }}
          MEDIA_S3_KEY_PREFIX: ${{ secrets.MEDIA_S3_KEY_PREFIX }}
          MEDIA_S3_ACL: ${{ secrets.MEDIA_S3_ACL }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          python main.py post-due --manifest manifests/manifest.csv --state state/post_state.json

      - name: Commit and push updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- manifests/manifest.csv state/post_state.json; then
            echo "No manifest/state changes to commit."
            exit 0
          fi
          git add manifests/manifest.csv state/post_state.json
          git commit -m "chore: update reels post state [skip ci]"
          git push
